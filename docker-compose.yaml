services:
  memos:
    image: neosmemo/memos:latest
    container_name: memos
    restart: unless-stopped
    environment:
      MEMOS_DRIVER: postgres
      # Set MEMOS_DSN in the deployment environment or an uncommitted .env file.
      # Do not commit database credentials.
      MEMOS_DSN: ${MEMOS_DSN:?Set MEMOS_DSN to your external PostgreSQL connection string}
    volumes:
      # Keeps local Memos runtime data such as uploaded resources; database data lives in external PostgreSQL.
      - ~/.memos/:/var/opt/memos
    ports:
      - 5230:5230
